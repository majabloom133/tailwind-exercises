<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind Landing Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<!-- This opens the body with light gray background and dark slate text color -->
<body class="bg-slate-50 text-slate-800">
<!-- Creates white navigation bar that stays fixed at the top when scrolling -->
<nav class="sticky top-0 z-50 bg-white border-b border-slate-200">
    <!-- Centers content, limits the width, adds padding on all sides -->
    <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
        <a href="#" class="text-xl font-bold text-indigo-600">FlexiPage</a>

        <!-- Holds menu links, hides them on mobile, shows them as row on medium screens -->
        <div class="hidden md:flex space-x-6 font-medium">
            <a href="#" class="hover:text-indigo-600 transition-colors">Features</a>
            <a href="#" class="hover:text-indigo-600 transition-colors">Pricing</a>
            <a href="#" class="hover:text-indigo-600 transition-colors">Contact</a>
        </div>

        <!-- Creates solid purple button with padding and rounded corners on the right side -->
        <a href="#" class="bg-indigo-600 text-white px-4 py-2 rounded-lg font-medium hover:bg-indigo-700 transition-colors">Get Started</a>
    </div>
</nav>

<!-- Creates main hero container, centering text with large vertical padding -->
<header class="max-w-6xl mx-auto px-4 py-16 md:py-24 text-center">
    <!-- Small uppercase purple badge centered above the heading -->
    <span class="inline-block text-xs font-bold uppercase tracking-wider text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full mb-4">Introducing FlexiPage</span>

    <h1 class="mt-6 text-lg md:text-xl text-slate-600 max-w-2xl mx-auto">A modern starter template crafted with Tailwind CSS utility classes. Fully responsive , clean layout, easy to customize</h1>

    <!-- Holds buttons, stacking them on mobile and placing them in a row on larger screens -->
    <div class="mt-10 flex flex-col sm:flex-row justify-center items-center gap-4">
        <a href="#" class="w-full sm:w-auto bg-indigo-600 text-white text-center px-8 py-4 rounded-xl font-semibold shadow-lg shadow-indigo-200 hover:bg-indigo-700 transition-all">Start Free Trial</a>
        <a href="#" class="w-full sm:w-auto border border-slate-300 bg-white text-slate-700 text-center px-8 py-4 rounded-xl font-semibold hover:bg-slate-50 transition-all">Learn More</a>
    </div>
</header>

</body>
</html>
